<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradiente principal -->
  <defs>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo redondeado -->
  <rect x="10" y="10" width="100" height="100" rx="20" fill="url(#primaryGradient)"/>
  
  <!-- KDice - Diseño moderno -->
  <g transform="translate(60, 45)">
    <!-- K -->
    <text x="-25" y="5" 
          font-family="Arial Black, sans-serif" 
          font-size="24" 
          font-weight="900" 
          fill="#ffffff" 
          text-anchor="middle">
      K
    </text>
    
    <!-- Dice icon -->
    <g transform="translate(5, -8)">
      <rect x="0" y="0" width="16" height="16" rx="3" fill="#ffffff" opacity="0.9"/>
      <circle cx="4" cy="4" r="1.5" fill="#667eea"/>
      <circle cx="12" cy="4" r="1.5" fill="#667eea"/>
      <circle cx="4" cy="12" r="1.5" fill="#667eea"/>
      <circle cx="12" cy="12" r="1.5" fill="#667eea"/>
    </g>
  </g>
  
  <!-- Texto inferior -->
  <text x="60" y="85" 
        font-family="Arial, sans-serif" 
        font-size="9" 
        font-weight="600" 
        fill="#ffffff" 
        text-anchor="middle"
        opacity="0.9">
    RESERVAS
  </text>
</svg>
