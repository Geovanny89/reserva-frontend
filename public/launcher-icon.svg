<?xml version="1.0" encoding="UTF-8"?>
<svg width="192" height="192" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="96" y1="0" x2="96" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF5E00"/>
      <stop offset="50%" stop-color="#E0007F"/>
      <stop offset="100%" stop-color="#4B0082"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="96" cy="96" r="96" fill="url(#bgGradient)"/>

  <!-- White circle border -->
  <circle cx="96" cy="96" r="84" fill="white" stroke="white" stroke-width="8"/>

  <!-- Icon background gradient circle -->
  <circle cx="96" cy="96" r="76" fill="url(#bgGradient)"/>

  <!-- Calendar icon (simplified for small size) -->
  <!-- Calendar outer rectangle -->
  <rect x="56" y="56" width="80" height="60" rx="6" fill="white" stroke="#1A1A1A" stroke-width="3"/>
  
  <!-- Calendar top rings -->
  <rect x="62" y="50" width="10" height="12" rx="1" fill="white"/>
  <rect x="120" y="50" width="10" height="12" rx="1" fill="white"/>

  <!-- Calendar grid lines -->
  <line x1="62" y1="80" x2="130" y2="80" stroke="#1A1A1A" stroke-width="2"/>
  <line x1="62" y1="96" x2="130" y2="96" stroke="#1A1A1A" stroke-width="2"/>
  
  <!-- Vertical grid lines -->
  <line x1="76" y1="80" x2="76" y2="110" stroke="#1A1A1A" stroke-width="2"/>
  <line x1="96" y1="80" x2="96" y2="110" stroke="#1A1A1A" stroke-width="2"/>
  <line x1="116" y1="80" x2="116" y2="110" stroke="#1A1A1A" stroke-width="2"/>

  <!-- Checkmark on calendar -->
  <path d="M98 86 L102 92 L114 78" fill="none" stroke="#1A1A1A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Hand tapping (simplified) -->
  <!-- Index finger pointing down -->
  <path d="M96 116 L96 132 L94 136 L98 136 L98 132" fill="white" stroke="#1A1A1A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
