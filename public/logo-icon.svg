<svg width="192" height="192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo con gradiente KDice -->
  <defs>
    <linearGradient id="kdiceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo redondeado -->
  <rect x="0" y="0" width="192" height="192" rx="48" fill="url(#kdiceGradient)"/>
  
  <!-- KDice Logo -->
  <g transform="translate(96, 76)">
    <!-- K -->
    <text x="-40" y="8" 
          font-family="Arial Black, sans-serif" 
          font-size="36" 
          font-weight="900" 
          fill="#ffffff" 
          text-anchor="middle">
      K
    </text>
    
    <!-- Dice -->
    <g transform="translate(8, -12)">
      <rect x="0" y="0" width="24" height="24" rx="6" fill="#ffffff" opacity="0.95"/>
      <circle cx="6" cy="6" r="2.5" fill="#667eea"/>
      <circle cx="18" cy="6" r="2.5" fill="#667eea"/>
      <circle cx="6" cy="18" r="2.5" fill="#667eea"/>
      <circle cx="18" cy="18" r="2.5" fill="#667eea"/>
    </g>
  </g>
  
  <!-- Texto RESERVAS -->
  <text x="96" y="140" 
        font-family="Arial, sans-serif" 
        font-size="14" 
        font-weight="700" 
        fill="#ffffff" 
        text-anchor="middle"
        opacity="0.95">
    RESERVAS
  </text>
</svg>
